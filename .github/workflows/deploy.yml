name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Start SSH agent and add the private key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.1
        with:
          ssh-private-key: ${{ secrets.GH_SSH_KEY }}

      # Checkout the repo using SSH
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - run: npm ci

      # Build Astro project
      - run: npm run build

      # Deploy to GitHub Pages via SSH
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          remote_url: git@github.com:marorcas/portfolio-2026.git
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "Deploy portfolio to GitHub Pages"
          force_orphan: true
